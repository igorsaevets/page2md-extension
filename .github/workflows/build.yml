name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-chrome:
    name: Zip Chrome MV3 artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js 24 LTS
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Zip Chrome extension
        run: npx wxt zip -b chrome

      - name: Locate zip artifact
        id: zip
        run: |
          ZIP_PATH=$(ls .output/page2ai-extension-*-chrome.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "::error::No Chrome zip produced under .output/"
            ls -la .output/ || true
            exit 1
          fi
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "Chrome zip: $ZIP_PATH ($(du -h "$ZIP_PATH" | cut -f1))"

      - name: Upload Chrome zip
        uses: actions/upload-artifact@v7
        with:
          name: page2ai-chrome-${{ github.sha }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 30
