name: Publish to Chrome Web Store

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build zip and create GH release but skip CWS upload'
        type: boolean
        default: false

concurrency:
  group: publish-chrome
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Zip → CWS → GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js 24 LTS
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG_REF="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag: $TAG_REF"
          echo "Package: $PKG_VERSION"
          if [ "$TAG_REF" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_REF does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Zip Chrome extension
        run: npx wxt zip -b chrome

      - name: Locate zip artifact
        id: zip
        run: |
          ZIP_PATH=$(ls .output/*-chrome.zip | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "::error::No Chrome zip produced under .output/"
            exit 1
          fi
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "Chrome zip: $ZIP_PATH ($(du -h "$ZIP_PATH" | cut -f1))"

      # TODO(2026-10-15): Chrome Web Store API V1 is sunset on 15 Oct 2026.
      # mnao305/chrome-extension-upload@v6.0.0 still bundles the V1 upstream
      # (chrome-webstore-upload@^1.0.0). BEFORE the deadline, migrate to either:
      #   (a) a V2-ready action once mnao305 upgrades to chrome-webstore-upload@^6,
      #   (b) a direct call to chrome-webstore-upload@^6 (requires new `publisherId`
      #       input — see HT-11 in .memory/HUMAN_TASKS.md).
      # Refs: https://github.com/mnao305/chrome-extension-upload
      #       https://github.com/fregante/chrome-webstore-upload/issues/114
      - name: Upload to Chrome Web Store
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        # SHA-pinned to v6.0.0 (2026-03-31). Update pin when bumping tag.
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
          publish-target: default

      - name: Create GitHub Release
        # SHA-pinned to v3.0.2 (2026-07-13). Runtime bumped to Node 24 — matches our setup.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true
          body: |
            Chrome extension zip is attached to this release and has been submitted to the Chrome Web Store.

            See [CHANGELOG.md](CHANGELOG.md) for the full list of changes.
          fail_on_unmatched_files: true
